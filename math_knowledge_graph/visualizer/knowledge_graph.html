<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初中数学知识图谱导航</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 15px;
            color: white;
            text-align: center;
        }
        .stat-card .number { font-size: 2em; font-weight: bold; }
        .main-content {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
        }
        .sidebar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-height: calc(100vh - 200px);
            overflow-y: auto;
        }
        .sidebar h2 {
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .category-item {
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .category-item:hover {
            background: #f0f0ff;
            transform: translateX(5px);
        }
        .category-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .knowledge-tree {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .tree-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .tree-header h2 { color: #333; }
        .toggle-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            background: #f0f0f0;
            cursor: pointer;
            margin-left: 10px;
        }
        .toggle-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .tree-node { margin: 5px 0; }
        .node-header {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            gap: 10px;
        }
        .node-header:hover { background: #f8f9fa; }
        .node-header.level-1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.3em;
            font-weight: bold;
            margin: 15px 0;
        }
        .node-header.level-2 {
            background: #e8eaf6;
            color: #3f51b5;
            font-weight: bold;
            margin-left: 20px;
        }
        .node-header.level-3 {
            margin-left: 40px;
            border-left: 3px solid #667eea;
        }
        .expand-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(102, 126, 234, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            transition: transform 0.3s;
        }
        .expand-icon.expanded { transform: rotate(90deg); }
        .node-name { flex: 1; }
        .node-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            background: #e8eaf6;
            color: #3f51b5;
        }
        .node-children { display: none; }
        .node-children.expanded { display: block; }
        .detail-panel {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            border-left: 4px solid #667eea;
        }
        .detail-panel.show { display: block; }
        .detail-panel h3 { color: #667eea; margin-bottom: 15px; }
        .detail-section { margin: 15px 0; }
        .detail-section h4 { color: #333; margin-bottom: 10px; }
        .detail-section p { color: #666; line-height: 1.8; }
        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
            .sidebar { max-height: none; }
        }
    </style>
</head>

    let currentFilter = 'all';

    // 渲染分类列表
    function renderCategories() {
        const categoryList = document.getElementById('categoryList');
        const categoryIcons = {'主题': '📚', '模型': '🧩', '方法': '🔧', '定理': '📐', '公式': '📝'};
        
        let html = '<div class="category-item active" onclick="filterByCategory(\'all\')">📊 全部知识点</div>';
        
        for (const [id, cat] of Object.entries(graphData.categories)) {
            const icon = categoryIcons[cat.type] || '📌';
            html += `<div class="category-item" onclick="filterByCategory('${id}')">${icon} ${cat.name}</div>`;
        }
        
        categoryList.innerHTML = html;
    }

    // 渲染知识树
    function renderTree() {
        const treeContent = document.getElementById('treeContent');
        const rootNodes = Object.values(graphData.nodes).filter(node => node.level === 1);
        
        let html = '';
        rootNodes.forEach(node => {
            html += renderNode(node);
        });
        
        treeContent.innerHTML = html;
    }

    // 渲染单个节点
    function renderNode(node) {
        const hasChildren = node.children && node.children.length > 0;
        const levelClass = `level-${node.level}`;
        
        let childrenHtml = '';
        if (hasChildren) {
            const children = node.children
                .map(childId => graphData.nodes[childId])
                .filter(child => child && (currentFilter === 'all' || child.categories.includes(currentFilter)));
            
            if (children.length > 0) {
                childrenHtml = `<div class="node-children" id="children-${node.id}">`;
                children.forEach(child => {
                    childrenHtml += renderNode(child);
                });
                childrenHtml += '</div>';
            }
        }
        
        const categoryBadges = node.categories
            .slice(0, 2)
            .map(catId => graphData.categories[catId])
            .filter(cat => cat)
            .map(cat => `<span class="node-badge">${cat.name}</span>`)
            .join('');
        
        return `
            <div class="tree-node">
                <div class="node-header ${levelClass}" onclick="toggleNode('${node.id}')">
                    ${hasChildren ? '<span class="expand-icon">▶</span>' : '<span style="width:24px"></span>'}
                    <span class="node-name">${node.name}</span>
                    ${categoryBadges}
                </div>
                ${childrenHtml}
            </div>
        `;
    }

    // 切换节点展开/折叠
    function toggleNode(nodeId) {
        const node = graphData.nodes[nodeId];
        if (!node || !node.children || node.children.length === 0) {
            showDetail(node);
            return;
        }
        
        const childrenEl = document.getElementById(`children-${nodeId}`);
        const headerEl = childrenEl.previousElementSibling;
        const iconEl = headerEl.querySelector('.expand-icon');
        
        if (childrenEl.classList.contains('expanded')) {
            childrenEl.classList.remove('expanded');
            if (iconEl) iconEl.classList.remove('expanded');
        } else {
            childrenEl.classList.add('expanded');
            if (iconEl) iconEl.classList.add('expanded');
        }
    }

    // 显示详情
    function showDetail(node) {
        const detailPanel = document.getElementById('detailPanel');
        
        if (!node || !node.content) {
            detailPanel.classList.remove('show');
            return;
        }
        
        const content = node.content;
        let html = `<h3>${node.name}</h3>`;
        
        if (content.explanation) {
            html += `<div class="detail-section"><h4>📖 详细讲解</h4><p>${content.explanation}</p></div>`;
        }
        
        html += `<div class="detail-section"><h4>📊 知识点属性</h4><p>难度：${'⭐'.repeat(node.difficulty || 3)}</p></div>`;
        
        detailPanel.innerHTML = html;
        detailPanel.classList.add('show');
    }

    // 按分类筛选
    function filterByCategory(categoryId) {
        currentFilter = categoryId;
        document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
        event.target.classList.add('active');
        renderTree();
        document.getElementById('detailPanel').classList.remove('show');
    }

    // 全部展开
    function expandAll() {
        document.querySelectorAll('.node-children').forEach(el => el.classList.add('expanded'));
        document.querySelectorAll('.expand-icon').forEach(el => el.classList.add('expanded'));
    }

    // 全部折叠
    function collapseAll() {
