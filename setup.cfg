[mypy]
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
check_untyped_defs = True
disallow_incomplete_defs = False
strict_optional = True
warn_redundant_casts = True
warn_unused_ignores = True

[mypy-quant_system.logger]
ignore_errors = False

[mypy-quant_system.cache]
ignore_errors = False

[mypy-quant_system.exceptions]
ignore_errors = False

[mypy-quant_system.database]
ignore_errors = False

[flake8]
max-line-length = 120
max-complexity = 10
exclude = 
    .git,
    __pycache__,
    build,
    dist,
    *.pyc
ignore = E203, W503

[tool:pytest]
minversion = 7.0
addopts = -ra -q
testpaths = tests
